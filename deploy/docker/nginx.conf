# ============================================================
# nginx.conf — Reverse proxy for Network Performance Dashboard
# ============================================================
# Stack: nginx:3013 → app:3020
# Features: rate limiting, security headers, SSE support,
#           static asset caching, WebSocket upgrade
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=bff:10m rate=10r/s;

upstream app {
    server app:3020;
    keepalive 32;
}

server {
    listen 3013;
    server_name _;

    # ─── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'" always;
    # HSTS: only enable when TLS is terminated at this layer or upstream
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Default: proxy to app ────────────────────────────────
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support (Flow Theater trace streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─── BFF routes — stricter rate limit ─────────────────────
    location /api/bff/ {
        limit_req zone=bff burst=20 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ─── tRPC routes ──────────────────────────────────────────
    location /api/trpc/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static assets — aggressive caching ───────────────────
    location /assets/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Health check endpoint for load balancers ─────────────
    location /health {
        access_log off;
        proxy_pass http://app/;
        proxy_http_version 1.1;
    }
}

# Uncomment for HTTPS (TLS termination at nginx):
