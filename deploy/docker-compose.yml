# ============================================================
# docker-compose.yml — Full stack: App + MySQL + Nginx
# ============================================================
# Usage:
#   1. cp deploy/env.example .env && edit .env
#   2. docker compose -f deploy/docker-compose.yml up -d
#   3. docker compose -f deploy/docker-compose.yml exec app node -e "console.log('ready')"
# ============================================================

services:
  # ---------- MySQL 8 ----------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-netperf_root_pass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-network_perf}
      MYSQL_USER: ${MYSQL_USER:-netperf}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-netperf_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # Auto-apply migrations on first start
      - ../drizzle/0000_amusing_nomad.sql:/docker-entrypoint-initdb.d/001_users.sql:ro
      - ../drizzle/0001_free_junta.sql:/docker-entrypoint-initdb.d/002_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-netperf_root_pass}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------- Application ----------
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-netperf}:${MYSQL_PASSWORD:-netperf_pass}@db:3306/${MYSQL_DATABASE:-network_perf}
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID:-}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://id.manus.im}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      OWNER_NAME: ${OWNER_NAME:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY:-}
      EH_HOST: ${EH_HOST:-}
      EH_API_KEY: ${EH_API_KEY:-}
      ETL_INTERVAL_MS: ${ETL_INTERVAL_MS:-300000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------- Nginx reverse proxy (optional) ----------
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount your SSL certs here if using HTTPS:
      # - /etc/letsencrypt/live/yourdomain.com/fullchain.pem:/etc/nginx/ssl/cert.pem:ro
      # - /etc/letsencrypt/live/yourdomain.com/privkey.pem:/etc/nginx/ssl/key.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mysql_data:
