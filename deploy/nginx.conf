# ============================================================
# nginx.conf — Reverse proxy for Network Performance Dashboard
# ============================================================
# Handles: HTTP→HTTPS redirect, SSL termination, proxy to app,
#          WebSocket upgrade (for SSE/future WS), static caching
# ============================================================

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=bff:10m rate=10r/s;

upstream app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Uncomment for HTTPS redirect:
    # return 301 https://$host$request_uri;

    # Comment out this location block when enabling HTTPS redirect above
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE support (Flow Theater trace streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # BFF routes — stricter rate limit
    location /api/bff/ {
        limit_req zone=bff burst=20 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # tRPC routes
    location /api/trpc/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — aggressive caching
    location /assets/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for load balancers
    location /health {
        access_log off;
        proxy_pass http://app/;
        proxy_http_version 1.1;
    }
}

# Uncomment for HTTPS:
# server {
#     listen 443 ssl http2;
#     server_name yourdomain.com;
