name: CI — Schema Drift + Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-drift:
    name: Schema Drift Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check schema drift
        run: |
          echo "=== Schema Drift Check ==="
          echo "Running drizzle-kit generate to detect uncommitted schema changes..."
          
          # Count migration files before
          BEFORE=$(find drizzle -name '*.sql' -not -path '*/meta/*' | wc -l)
          
          # Run drizzle-kit generate
          pnpm drizzle-kit generate 2>&1 || true
          
          # Count migration files after
          AFTER=$(find drizzle -name '*.sql' -not -path '*/meta/*' | wc -l)
          
          if [ "$AFTER" -gt "$BEFORE" ]; then
            echo ""
            echo "FAIL: drizzle-kit generated a new migration file."
            echo "This means schema.ts has changes that are not reflected in committed migrations."
            echo ""
            echo "To fix:"
            echo "  1. Run: pnpm drizzle-kit generate"
            echo "  2. Review the generated SQL"
            echo "  3. Apply it via webdev_execute_sql"
            echo "  4. Commit the new migration file"
            echo ""
            echo "New files:"
            diff <(echo "$BEFORE") <(echo "$AFTER") || true
            find drizzle -name '*.sql' -not -path '*/meta/*' -newer drizzle/meta/_journal.json
            exit 1
          fi
          
          echo "PASS: No schema drift detected. Migrations are in sync with schema.ts."

      - name: Verify migration count matches snapshots
        run: |
          SQL_COUNT=$(find drizzle -name '*.sql' -not -path '*/meta/*' | wc -l)
          SNAP_COUNT=$(find drizzle/meta -name '*.json' -not -name '_journal.json' | wc -l)
          
          if [ "$SQL_COUNT" -ne "$SNAP_COUNT" ]; then
            echo "FAIL: Migration SQL count ($SQL_COUNT) != snapshot count ($SNAP_COUNT)"
            echo "SQL files:"
            find drizzle -name '*.sql' -not -path '*/meta/*' | sort
            echo "Snapshot files:"
            find drizzle/meta -name '*.json' -not -name '_journal.json' | sort
            exit 1
          fi
          
          echo "PASS: $SQL_COUNT migrations, $SNAP_COUNT snapshots — counts match."

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          # Fixture mode — no live DB or ExtraHop needed
          EXTRAHOP_HOSTNAME: fixture
          EXTRAHOP_API_KEY: fixture

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: npx tsc --noEmit
